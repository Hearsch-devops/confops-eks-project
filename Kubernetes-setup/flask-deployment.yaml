apiVersion: apps/v1
kind: Deployment
metadata:
  name: flask-deployment
  namespace: conference-room
spec:
  replicas: 1
  selector:
    matchLabels:
      app: flask
  template:
    metadata:
      labels:
        app: flask
    spec:
      containers:
      - name: flask
        image: 489364174245.dkr.ecr.us-east-1.amazonaws.com/confops:v1
        imagePullPolicy: Always
        ports:
        - containerPort: 5000
        env:
        - name: DATABASE_URL
          value: "postgresql://conf_user:conf_pass@postgres:5432/conference_db"
---
apiVersion: v1
kind: Service
metadata:
  name: flask-service
  namespace: conference-room
spec:
  type: NodePort
  selector:
    app: flask
  ports:
    - port: 5000
      targetPort: 5000
      nodePort: 30500
